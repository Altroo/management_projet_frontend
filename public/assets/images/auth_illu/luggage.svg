<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Suitcase Body -->
  <rect x="90" y="120" width="220" height="200" rx="16" fill="#FFFFFF" stroke="#2C3E50" stroke-width="3"/>
  <!-- Suitcase Stripe -->
  <rect x="90" y="200" width="220" height="18" fill="#3498DB" opacity="0.3"/>
  <!-- Handle -->
  <path d="M160 120 L160 90 Q160 74 176 74 L224 74 Q240 74 240 90 L240 120" fill="none" stroke="#2C3E50" stroke-width="4" stroke-linecap="round"/>
  <!-- Handle Grip -->
  <rect x="155" y="84" width="90" height="14" rx="7" fill="#2C3E50" opacity="0.15"/>
  <!-- Zipper Line -->
  <line x1="90" y1="218" x2="310" y2="218" stroke="#BDC3C7" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Zipper Pull -->
  <circle cx="310" cy="218" r="6" fill="#F39C12" stroke="#2C3E50" stroke-width="1.5"/>
  <!-- Latch -->
  <rect x="186" y="112" width="28" height="14" rx="4" fill="#BDC3C7" stroke="#2C3E50" stroke-width="1.5"/>
  <rect x="192" y="116" width="16" height="6" rx="3" fill="#95A5A6"/>
  <!-- Travel Sticker 1 - Destination Tag -->
  <rect x="110" y="148" width="72" height="44" rx="6" fill="#27AE60" stroke="#2C3E50" stroke-width="1.5"/>
  <circle cx="146" cy="160" r="8" fill="#FFFFFF" opacity="0.7"/>
  <rect x="118" y="174" width="56" height="7" rx="3" fill="#FFFFFF" opacity="0.5"/>
  <rect x="126" y="185" width="40" height="5" rx="2" fill="#FFFFFF" opacity="0.35"/>
  <!-- Travel Sticker 2 - Stamp -->
  <circle cx="258" cy="172" r="34" fill="#E74C3C" stroke="#2C3E50" stroke-width="1.5"/>
  <circle cx="258" cy="172" r="26" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="244" y="166" width="28" height="8" rx="4" fill="#FFFFFF" opacity="0.7"/>
  <rect x="248" y="178" width="20" height="6" rx="3" fill="#FFFFFF" opacity="0.5"/>
  <!-- Wheels -->
  <circle cx="130" cy="328" r="20" fill="#2C3E50"/>
  <circle cx="130" cy="328" r="12" fill="#7F8C8D"/>
  <circle cx="130" cy="328" r="5" fill="#BDC3C7"/>
  <circle cx="270" cy="328" r="20" fill="#2C3E50"/>
  <circle cx="270" cy="328" r="12" fill="#7F8C8D"/>
  <circle cx="270" cy="328" r="5" fill="#BDC3C7"/>
  <!-- Bottom Bar -->
  <rect x="110" y="320" width="180" height="8" rx="4" fill="#BDC3C7" stroke="#2C3E50" stroke-width="1.5"/>
  <!-- Ground Shadow -->
  <ellipse cx="200" cy="358" rx="110" ry="10" fill="#2C3E50" opacity="0.08"/>
</svg>
