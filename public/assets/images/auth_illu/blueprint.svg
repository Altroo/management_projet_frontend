<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Blueprint Paper -->
  <rect x="60" y="50" width="280" height="300" rx="4" fill="#1A5276" stroke="#154360" stroke-width="3"/>
  <!-- Grid Lines Horizontal -->
  <line x1="80" y1="100" x2="320" y2="100" stroke="#2980B9" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="150" x2="320" y2="150" stroke="#2980B9" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="200" x2="320" y2="200" stroke="#2980B9" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="250" x2="320" y2="250" stroke="#2980B9" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="300" x2="320" y2="300" stroke="#2980B9" stroke-width="0.5" opacity="0.5"/>
  <!-- Grid Lines Vertical -->
  <line x1="120" y1="70" x2="120" y2="330" stroke="#2980B9" stroke-width="0.5" opacity="0.5"/>
  <line x1="200" y1="70" x2="200" y2="330" stroke="#2980B9" stroke-width="0.5" opacity="0.5"/>
  <line x1="280" y1="70" x2="280" y2="330" stroke="#2980B9" stroke-width="0.5" opacity="0.5"/>
  <!-- Building Floor Plan -->
  <rect x="120" y="120" width="160" height="120" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Rooms -->
  <line x1="200" y1="120" x2="200" y2="240" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="120" y1="180" x2="200" y2="180" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Door Arcs -->
  <path d="M195 240 A15 15 0 0 1 180 225" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M125 175 A15 15 0 0 0 140 160" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Dimension Lines -->
  <line x1="120" y1="260" x2="280" y2="260" stroke="#E74C3C" stroke-width="1"/>
  <line x1="120" y1="255" x2="120" y2="265" stroke="#E74C3C" stroke-width="1"/>
  <line x1="280" y1="255" x2="280" y2="265" stroke="#E74C3C" stroke-width="1"/>
  <text x="185" y="275" font-size="10" fill="#E74C3C" font-family="sans-serif">16m</text>
  <!-- Compass -->
  <circle cx="310" cy="90" r="18" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="306" y="82" font-size="10" fill="#E74C3C" font-family="sans-serif" font-weight="bold">N</text>
  <line x1="310" y1="95" x2="310" y2="105" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Title Block -->
  <rect x="80" y="300" width="240" height="30" rx="2" fill="#154360" stroke="#2980B9" stroke-width="1"/>
  <rect x="90" y="308" width="100" height="6" rx="3" fill="#FFFFFF" opacity="0.4"/>
  <rect x="90" y="318" width="60" height="4" rx="2" fill="#FFFFFF" opacity="0.25"/>
</svg>
